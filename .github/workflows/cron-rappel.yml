name: Envoi des Rappels du Mercredi

on:
  schedule:
    # S'exécute tous les jeudis à 12h00 UTC (soit 18h00 ou 19h00 en France selon l'heure d'été)
    - cron: '0 12 * * 3'
  workflow_dispatch: # Permet de lancer le script manuellement pour tester

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les modules nécessaires
        run: npm install @supabase/supabase-js resend

      - name: Lancer le script de rappel
        env:
          SUPABASE_URL: 'https://vdetqssagjdlvpffmorp.supabase.co'
          SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkZXRxc3NhZ2pkbHZwZmZtb3JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODQyNDUsImV4cCI6MjA5NDc2MDI0NX0.kMmilrlCcQP8qLy76ClvwfsHY774iLxJjGOfT8tQsNg'
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node rappel.js
